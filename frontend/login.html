<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthOS Pro — Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-card glass-panel">
            <div class="login-header">
                <div class="logo-dot"></div>
                <h2>Welcome Back</h2>
                <p>Sign in to your HealthOS Pro account</p>
            </div>
            
            <!-- Demo credentials notice -->
            <div style="
                background: rgba(16,185,129,0.12);
                border: 1px solid rgba(16,185,129,0.35);
                border-radius: 10px;
                padding: 12px 16px;
                margin-bottom: 20px;
                font-size: 0.85rem;
                color: #064e3b;
                line-height: 1.6;
            ">
                <strong style="color:#059669;">🔑 Demo Account (works on any device)</strong><br>
                Email: <code>user@example.com</code><br>
                Password: <code>password123</code>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div id="loginError" class="error-text"></div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    <span>Sign In</span>
                    <div class="loader" id="loginLoader" style="display:none;"></div>
                </button>
            </form>
            
            <div class="login-footer">
                <p>Don't have an account? <a href="signup.html">Sign up →</a></p>
            </div>
        </div>
    </div>
    
    <!-- Background decorative elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <script src="login.js"></script>
</body>
</html>
